<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Javis Pastelería - Administración</title>
    
    <!-- Carga de Tailwind CSS para el diseño -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Carga de Babel para traducir React dentro del navegador -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <style>
        /* Animaciones base */
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-in { animation: fadeIn 0.4s ease-out forwards; }
    </style>
</head>
<body class="bg-amber-50 text-stone-800 antialiased">
    
    <!-- Contenedor principal donde React dibujará la aplicación -->
    <div id="root"></div>

    <!-- Script principal de la aplicación -->
    <script type="text/babel" data-type="module">
        import React, { useState, useMemo, useRef, useEffect } from 'https://esm.sh/react@18';
        import { createRoot } from 'https://esm.sh/react-dom@18/client';
        import { initializeApp } from 'https://esm.sh/firebase@11.6.1/app';
        import { getAuth, signInAnonymously, signInWithCustomToken, onAuthStateChanged } from 'https://esm.sh/firebase@11.6.1/auth';
        import { getFirestore, collection, onSnapshot, addDoc, doc, updateDoc } from 'https://esm.sh/firebase@11.6.1/firestore';
        import { Home, CakeSlice, Store, Wallet, Receipt, Phone, PlusCircle, CheckCircle, Camera, AlertCircle, TrendingUp, TrendingDown, Package } from 'https://esm.sh/lucide-react@0.292.0';

        // =====================================================================
        // ATENCIÓN: CONFIGURACIÓN DE BASE DE DATOS (FIREBASE)
        // Si publicas este HTML en tu propio dominio, debes crear un proyecto
        // gratuito en Firebase (firebase.google.com) y reemplazar estos datos:
        // =====================================================================
        const myFirebaseConfig = {
            apiKey: "AIzaSyDy1G-ZJA3cOwd3uEM7bpy3JzdhSUcooXc",
            authDomain: "prueba3-c53fd.firebaseapp.com",
            projectId: "prueba3-c53fd",
            storageBucket: "prueba3-c53fd.firebasestorage.app",
            messagingSenderId: "385199293635",
            appId: "1:385199293635:web:b2e133215ba51065954e76"
        };

        // Forzamos a usar TU configuración manual si cambiaste la API Key
        let firebaseConfig = null;
        if (myFirebaseConfig.apiKey && myFirebaseConfig.apiKey !== "AIzaSyDy1G-ZJA3cOwd3uEM7bpy3JzdhSUcooXc") {
            firebaseConfig = myFirebaseConfig;
        } else {
            try {
                if (typeof __firebaseconfig !== 'undefined' && __firebaseconfig) {
                    firebaseConfig = typeof __firebaseconfig === 'string' ? JSON.parse(__firebaseconfig) : __firebaseconfig;
                }
            } catch (e) {
                console.warn("Error al leer configuración de entorno");
            }
        }
        
        const appDbId = typeof __app_id !== 'undefined' && __app_id ? __app_id : 'javis-pasteleria-app';

        // Inicialización de la Nube
        let app, auth, db;
        try {
            if (firebaseConfig && firebaseConfig.apiKey && firebaseConfig.apiKey !== "AIzaSyDy1G-ZJA3cOwd3uEM7bpy3JzdhSUcooXc") {
                app = initializeApp(firebaseConfig);
                auth = getAuth(app);
                db = getFirestore(app);
            } else {
                console.log("Configuración de Firebase incompleta. Iniciando en modo local/demo.");
            }
        } catch (error) {
            console.warn("Falta configurar Firebase o hay un error. Iniciando en modo local.", error.message);
        }

        // Formateador de moneda (Pesos Chilenos)
        const formatCurrency = (value) => {
            return new Intl.NumberFormat('es-CL', {
                style: 'currency', currency: 'CLP', maximumFractionDigits: 0
            }).format(value);
        };

        const getTodayDate = () => {
            const d = new Date();
            const year = d.getFullYear();
            const month = String(d.getMonth() + 1).padStart(2, '0');
            const day = String(d.getDate()).padStart(2, '0');
            return `${year}-${month}-${day}`;
        };

        const exportToCSV = (data, filename) => {
            if (!data || !data.length) return;
            const headers = Object.keys(data[0]).join(',');
            const rows = data.map(obj => 
                Object.values(obj).map(val => `"${String(val).replace(/"/g, '""')}"`).join(',')
            ).join('\n');
            const csvContent = "data:text/csv;charset=utf-8,\uFEFF" + headers + "\n" + rows;
            const encodedUri = encodeURI(csvContent);
            const link = document.createElement("a");
            link.setAttribute("href", encodedUri);
            link.setAttribute("download", filename + ".csv");
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);
        };

        function App() {
            const [activeTab, setActiveTab] = useState('dashboard');
            const [notification, setNotification] = useState(null);
            const [user, setUser] = useState(null);

            const [production, setProduction] = useState([]);
            const [sales, setSales] = useState([]);
            const [expenses, setExpenses] = useState([]);

            // Autenticación
            useEffect(() => {
                if(!auth) return;
                const initAuth = async () => {
                    try {
                        if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                            await signInWithCustomToken(auth, __initial_auth_token);
                        } else {
                            await signInAnonymously(auth);
                        }
                    } catch(e) { console.error("Auth error", e); }
                };
                initAuth();
                const unsubscribe = onAuthStateChanged(auth, setUser);
                return () => unsubscribe();
            }, []);

            // Sincronización de datos
            useEffect(() => {
                if (!user || !db) return;
                
                const prodRef = collection(db, 'artifacts', appDbId, 'public', 'data', 'production');
                const salesRef = collection(db, 'artifacts', appDbId, 'public', 'data', 'sales');
                const expRef = collection(db, 'artifacts', appDbId, 'public', 'data', 'expenses');

                const unsubProd = onSnapshot(prodRef, 
                    (snap) => setProduction(snap.docs.map(d => ({ id: d.id, ...d.data() }))),
                    (err) => console.error(err)
                );
                const unsubSales = onSnapshot(salesRef, 
                    (snap) => setSales(snap.docs.map(d => ({ id: d.id, ...d.data() }))),
                    (err) => console.error(err)
                );
                const unsubExp = onSnapshot(expRef, 
                    (snap) => setExpenses(snap.docs.map(d => ({ id: d.id, ...d.data() }))),
                    (err) => console.error(err)
                );

                return () => { unsubProd(); unsubSales(); unsubExp(); };
            }, [user]);

            const inventory = useMemo(() => {
                const inv = {};
                production.forEach(p => {
                    if (!inv[p.product]) inv[p.product] = 0;
                    inv[p.product] += p.units;
                });
                sales.forEach(s => {
                    if (inv[s.product]) inv[s.product] -= s.quantity;
                });
                return inv;
            }, [production, sales]);

            const availableProducts = Object.keys(inventory).filter(product => inventory[product] > 0);

            const showNotification = (message, type = 'success') => {
                setNotification({ message, type });
                setTimeout(() => setNotification(null), 3000);
            };

            return (
                <div className="min-h-screen pb-20 md:pb-0 md:flex">
                    <nav className="bg-pink-600 text-white shadow-lg md:w-64 md:min-h-screen md:fixed flex flex-col z-10">
                        <div className="p-4 flex items-center justify-center space-x-2 border-b border-pink-500">
                            <CakeSlice size={28} />
                            <h1 className="text-xl font-bold tracking-wider">Javis Pastelería</h1>
                        </div>
                        <div className="hidden md:flex flex-col flex-1 p-4 space-y-2">
                            <NavItem icon={<Home />} label="Balance" isActive={activeTab === 'dashboard'} onClick={() => setActiveTab('dashboard')} />
                            <NavItem icon={<Package />} label="Producción" isActive={activeTab === 'produccion'} onClick={() => setActiveTab('produccion')} />
                            <NavItem icon={<Store />} label="Ventas" isActive={activeTab === 'ventas'} onClick={() => setActiveTab('ventas')} />
                            <NavItem icon={<Wallet />} label="Cobranza" isActive={activeTab === 'cobranza'} onClick={() => setActiveTab('cobranza')} />
                            <NavItem icon={<Receipt />} label="Gastos" isActive={activeTab === 'gastos'} onClick={() => setActiveTab('gastos')} />
                        </div>
                    </nav>

                    <main className="md:ml-64 flex-1 p-4 md:p-8 w-full max-w-5xl mx-auto pt-6">
                        {notification && (
                            <div className={`fixed top-4 right-4 z-50 p-4 rounded-lg shadow-xl flex items-center space-x-2 transition-all ${
                                notification.type === 'success' ? 'bg-green-100 text-green-800 border border-green-200' : 'bg-red-100 text-red-800 border border-red-200'
                            }`}>
                                {notification.type === 'success' ? <CheckCircle size={20} /> : <AlertCircle size={20} />}
                                <span className="font-medium">{notification.message}</span>
                            </div>
                        )}

                        {/* Manejo de estado sin conexión a Base de datos */}
                        {!db && (
                            <div className="bg-amber-100 border border-amber-300 text-amber-800 p-4 rounded-xl mb-6 flex items-start space-x-3">
                                <AlertCircle className="shrink-0 mt-0.5" />
                                <div>
                                    <h3 className="font-bold">Modo Demo / Sin Base de Datos</h3>
                                    <p className="text-sm mt-1">Para que tus datos se guarden en la nube, necesitas editar el código fuente y colocar tus credenciales de Firebase en la variable <code>myFirebaseConfig</code>. Por ahora, tus registros se guardarán temporalmente en esta sesión.</p>
                                </div>
                            </div>
                        )}

                        {activeTab === 'dashboard' && <Dashboard sales={sales} expenses={expenses} inventory={inventory} />}
                        {activeTab === 'produccion' && <Produccion showNotification={showNotification} db={db} appDbId={appDbId} setProduction={setProduction} />}
                        {activeTab === 'ventas' && <Ventas availableProducts={availableProducts} inventory={inventory} showNotification={showNotification} db={db} appDbId={appDbId} setSales={setSales} />}
                        {activeTab === 'cobranza' && <Cobranza sales={sales} showNotification={showNotification} db={db} appDbId={appDbId} setSales={setSales} />}
                        {activeTab === 'gastos' && <Gastos showNotification={showNotification} db={db} appDbId={appDbId} setExpenses={setExpenses} />}
                    </main>

                    <div className="md:hidden fixed bottom-0 w-full bg-white border-t border-gray-200 flex justify-around p-2 z-10 text-xs">
                        <MobileTab icon={<Home size={24} />} label="Balance" isActive={activeTab === 'dashboard'} onClick={() => setActiveTab('dashboard')} />
                        <MobileTab icon={<Package size={24} />} label="Produc" isActive={activeTab === 'produccion'} onClick={() => setActiveTab('produccion')} />
                        <MobileTab icon={<Store size={24} />} label="Ventas" isActive={activeTab === 'ventas'} onClick={() => setActiveTab('ventas')} />
                        <MobileTab icon={<Wallet size={24} />} label="Cobros" isActive={activeTab === 'cobranza'} onClick={() => setActiveTab('cobranza')} />
                        <MobileTab icon={<Receipt size={24} />} label="Gastos" isActive={activeTab === 'gastos'} onClick={() => setActiveTab('gastos')} />
                    </div>
                </div>
            );
        }

        // --- SUBCOMPONENTES ---

        function Dashboard({ sales, expenses, inventory }) {
            const today = getTodayDate();
            const dailySales = sales.filter(s => s.date === today && s.status === 'paid').reduce((acc, curr) => acc + curr.total, 0);
            const dailyDebt = sales.filter(s => s.date === today && s.status === 'debt').reduce((acc, curr) => acc + curr.total, 0);
            const dailyExpenses = expenses.filter(e => e.date === today).reduce((acc, curr) => acc + curr.total, 0);
            const balance = dailySales - dailyExpenses;
            const totalStockItems = Object.values(inventory).reduce((acc, curr) => acc + curr, 0);

            return (
                <div className="space-y-6 animate-in">
                    <div className="flex flex-col md:flex-row md:justify-between md:items-center border-b border-pink-200 pb-2 gap-3">
                        <h2 className="text-2xl font-bold text-pink-700">Balance del Día</h2>
                        <div className="flex space-x-2">
                            <button onClick={() => exportToCSV(sales, 'ventas_javis_pasteleria')} className="text-sm bg-white border border-pink-300 hover:bg-pink-50 text-pink-700 py-1.5 px-3 rounded-lg font-semibold transition-colors shadow-sm">Exportar Ventas</button>
                            <button onClick={() => exportToCSV(expenses, 'gastos_javis_pasteleria')} className="text-sm bg-white border border-pink-300 hover:bg-pink-50 text-pink-700 py-1.5 px-3 rounded-lg font-semibold transition-colors shadow-sm">Exportar Gastos</button>
                        </div>
                    </div>
                    
                    <div className="grid grid-cols-1 md:grid-cols-3 gap-4">
                        <div className="bg-white p-6 rounded-2xl shadow-sm border border-pink-100 flex flex-col">
                            <div className="flex items-center space-x-2 text-green-600 mb-2">
                                <TrendingUp size={20} />
                                <span className="font-semibold">Ingresos Hoy (Pagado)</span>
                            </div>
                            <span className="text-3xl font-bold text-gray-800">{formatCurrency(dailySales)}</span>
                            {dailyDebt > 0 && <span className="text-sm text-amber-600 mt-2">Por cobrar hoy: {formatCurrency(dailyDebt)}</span>}
                        </div>
                        <div className="bg-white p-6 rounded-2xl shadow-sm border border-pink-100 flex flex-col">
                            <div className="flex items-center space-x-2 text-red-500 mb-2">
                                <TrendingDown size={20} />
                                <span className="font-semibold">Gastos Hoy</span>
                            </div>
                            <span className="text-3xl font-bold text-gray-800">{formatCurrency(dailyExpenses)}</span>
                        </div>
                        <div className="bg-gradient-to-br from-pink-500 to-pink-600 p-6 rounded-2xl shadow-md text-white flex flex-col">
                            <div className="flex items-center space-x-2 mb-2">
                                <Wallet size={20} />
                                <span className="font-semibold">Balance Líquido Hoy</span>
                            </div>
                            <span className="text-3xl font-bold">{formatCurrency(balance)}</span>
                            <span className="text-pink-100 text-sm mt-2">Ingresos - Gastos</span>
                        </div>
                    </div>

                    <h3 className="text-xl font-bold text-pink-700 mt-8 mb-4">Inventario Actual</h3>
                    <div className="bg-white rounded-2xl shadow-sm border border-pink-100 overflow-hidden">
                        <div className="p-4 bg-pink-50 border-b border-pink-100 flex justify-between items-center">
                            <span className="font-semibold text-pink-800">Total de artículos en stock:</span>
                            <span className="font-bold text-lg text-pink-900">{totalStockItems} unidades</span>
                        </div>
                        <ul className="divide-y divide-gray-100">
                            {Object.entries(inventory).map(([product, qty], idx) => (
                                <li key={idx} className="p-4 flex justify-between items-center hover:bg-gray-50 transition-colors">
                                    <span className="font-medium text-gray-700">{product}</span>
                                    <span className={`px-3 py-1 rounded-full text-sm font-semibold ${qty > 5 ? 'bg-green-100 text-green-700' : qty > 0 ? 'bg-amber-100 text-amber-700' : 'bg-red-100 text-red-700'}`}>
                                        {qty} disp.
                                    </span>
                                </li>
                            ))}
                            {Object.keys(inventory).length === 0 && (
                                <li className="p-8 text-center text-gray-500 italic">No hay productos en inventario. Comienza registrando producción.</li>
                            )}
                        </ul>
                    </div>
                </div>
            );
        }

        function Produccion({ showNotification, db, appDbId, setProduction }) {
            const [formData, setFormData] = useState({ date: getTodayDate(), product: '', units: '' });

            const handleSubmit = async (e) => {
                e.preventDefault();
                if (!formData.product.trim() || formData.units <= 0) {
                    showNotification("Por favor ingresa un producto y una cantidad válida.", "error");
                    return;
                }
                const newRecord = {
                    date: formData.date, product: formData.product.trim(), units: parseInt(formData.units, 10), timestamp: new Date().toISOString()
                };
                
                if (db) {
                    try {
                        await addDoc(collection(db, 'artifacts', appDbId, 'public', 'data', 'production'), newRecord);
                        showNotification("Producción guardada correctamente.");
                        setFormData({ date: getTodayDate(), product: '', units: '' });
                    } catch (error) { showNotification("Error al guardar.", "error"); }
                } else {
                    newRecord.id = Date.now().toString();
                    setProduction(prev => [newRecord, ...prev]);
                    showNotification("Guardado localmente (Modo Demo).");
                    setFormData({ date: getTodayDate(), product: '', units: '' });
                }
            };

            return (
                <div className="max-w-2xl mx-auto space-y-6 animate-in">
                    <div className="flex items-center space-x-3 text-pink-700 border-b border-pink-200 pb-2">
                        <Package size={28} />
                        <h2 className="text-2xl font-bold">Registrar Producción</h2>
                    </div>
                    <form onSubmit={handleSubmit} className="bg-white p-6 md:p-8 rounded-2xl shadow-sm border border-pink-100 space-y-5">
                        <div>
                            <label className="block text-sm font-semibold text-gray-700 mb-1">Fecha de Producción</label>
                            <input type="date" value={formData.date} onChange={(e) => setFormData({...formData, date: e.target.value})} className="w-full p-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-pink-400 focus:border-pink-400 outline-none" required />
                        </div>
                        <div>
                            <label className="block text-sm font-semibold text-gray-700 mb-1">Nombre del Producto</label>
                            <input type="text" placeholder="Ej: Torta de Chocolate" value={formData.product} onChange={(e) => setFormData({...formData, product: e.target.value})} className="w-full p-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-pink-400 focus:border-pink-400 outline-none" required />
                        </div>
                        <div>
                            <label className="block text-sm font-semibold text-gray-700 mb-1">Unidades Producidas</label>
                            <input type="number" min="1" placeholder="Ej: 10" value={formData.units} onChange={(e) => setFormData({...formData, units: e.target.value})} className="w-full p-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-pink-400 focus:border-pink-400 outline-none" required />
                        </div>
                        <button type="submit" className="w-full bg-pink-600 text-white font-bold py-3 px-4 rounded-xl hover:bg-pink-700 active:scale-[0.98] transition-all flex justify-center items-center space-x-2">
                            <PlusCircle size={20} /> <span>Añadir al Stock</span>
                        </button>
                    </form>
                </div>
            );
        }

        function Ventas({ availableProducts, inventory, showNotification, db, appDbId, setSales }) {
            const [formData, setFormData] = useState({ date: getTodayDate(), product: '', quantity: '', unitPrice: '', client: '', paymentStatus: 'pagado', paymentMethod: 'efectivo', phone: '' });
            const currentStock = formData.product ? inventory[formData.product] : 0;
            const totalSale = (parseInt(formData.quantity) || 0) * (parseFloat(formData.unitPrice) || 0);

            const handleSubmit = async (e) => {
                e.preventDefault();
                if (!formData.product || parseInt(formData.quantity) > currentStock) return showNotification("Cantidad excede el stock disponible.", "error");
                if (formData.paymentStatus === 'deuda' && !formData.phone.trim()) return showNotification("El teléfono es obligatorio para deudas.", "error");

                const newSale = {
                    date: formData.date, product: formData.product, quantity: parseInt(formData.quantity, 10), unitPrice: parseFloat(formData.unitPrice), total: totalSale, client: formData.client.trim() || 'Cliente General', status: formData.paymentStatus === 'pagado' ? 'paid' : 'debt', paymentMethod: formData.paymentStatus === 'pagado' ? formData.paymentMethod : null, phone: formData.phone.trim(), timestamp: new Date().toISOString()
                };

                if (db) {
                    try {
                        await addDoc(collection(db, 'artifacts', appDbId, 'public', 'data', 'sales'), newSale);
                        showNotification("Venta registrada con éxito.");
                        setFormData({ date: getTodayDate(), product: '', quantity: '', unitPrice: '', client: '', paymentStatus: 'pagado', paymentMethod: 'efectivo', phone: '' });
                    } catch (error) { showNotification("Error al registrar.", "error"); }
                } else {
                    newSale.id = Date.now().toString();
                    setSales(prev => [newSale, ...prev]);
                    showNotification("Venta guardada localmente (Modo Demo).");
                    setFormData({ date: getTodayDate(), product: '', quantity: '', unitPrice: '', client: '', paymentStatus: 'pagado', paymentMethod: 'efectivo', phone: '' });
                }
            };

            return (
                <div className="max-w-2xl mx-auto space-y-6 animate-in">
                    <div className="flex items-center space-x-3 text-pink-700 border-b border-pink-200 pb-2">
                        <Store size={28} />
                        <h2 className="text-2xl font-bold">Nueva Venta</h2>
                    </div>
                    <form onSubmit={handleSubmit} className="bg-white p-6 md:p-8 rounded-2xl shadow-sm border border-pink-100 space-y-5">
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-5">
                            <div className="md:col-span-2">
                                <label className="block text-sm font-semibold text-gray-700 mb-1">Producto a vender</label>
                                <select value={formData.product} onChange={(e) => setFormData({...formData, product: e.target.value})} className="w-full p-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-pink-400 focus:border-pink-400 outline-none bg-white" required>
                                    <option value="" disabled>Selecciona un producto disponible...</option>
                                    {availableProducts.map(p => <option key={p} value={p}>{p}</option>)}
                                </select>
                                {formData.product && <p className="text-sm font-medium text-green-600 mt-1">Stock disponible: {currentStock} unidades</p>}
                            </div>
                            <div>
                                <label className="block text-sm font-semibold text-gray-700 mb-1">Cantidad</label>
                                <input type="number" min="1" max={currentStock || 1} value={formData.quantity} onChange={(e) => setFormData({...formData, quantity: e.target.value})} className="w-full p-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-pink-400 focus:border-pink-400 outline-none" required />
                            </div>
                            <div>
                                <label className="block text-sm font-semibold text-gray-700 mb-1">Precio Unitario ($)</label>
                                <input type="number" min="0" value={formData.unitPrice} onChange={(e) => setFormData({...formData, unitPrice: e.target.value})} className="w-full p-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-pink-400 focus:border-pink-400 outline-none" required />
                            </div>
                        </div>
                        <div className="p-4 bg-pink-50 rounded-xl border border-pink-100 flex justify-between items-center">
                            <span className="font-bold text-pink-800 text-lg">Total de Venta:</span>
                            <span className="font-bold text-2xl text-pink-600">{formatCurrency(totalSale)}</span>
                        </div>
                        <div>
                            <label className="block text-sm font-semibold text-gray-700 mb-1">Cliente (Opcional)</label>
                            <input type="text" placeholder="Nombre del cliente" value={formData.client} onChange={(e) => setFormData({...formData, client: e.target.value})} className="w-full p-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-pink-400 focus:border-pink-400 outline-none" />
                        </div>
                        <div className="border-t border-gray-200 pt-4 mt-2">
                            <label className="block text-sm font-semibold text-gray-700 mb-3">Estado de Pago</label>
                            <div className="flex space-x-4 mb-4">
                                <label className="flex items-center space-x-2 cursor-pointer">
                                    <input type="radio" name="paymentStatus" value="pagado" checked={formData.paymentStatus === 'pagado'} onChange={(e) => setFormData({...formData, paymentStatus: e.target.value})} className="w-5 h-5 text-pink-600 focus:ring-pink-500" />
                                    <span className="font-medium text-gray-800">Pagado al instante</span>
                                </label>
                                <label className="flex items-center space-x-2 cursor-pointer">
                                    <input type="radio" name="paymentStatus" value="deuda" checked={formData.paymentStatus === 'deuda'} onChange={(e) => setFormData({...formData, paymentStatus: e.target.value})} className="w-5 h-5 text-amber-600 focus:ring-amber-500" />
                                    <span className="font-medium text-gray-800">Dejar en Deuda</span>
                                </label>
                            </div>
                            <div className="bg-gray-50 p-4 rounded-xl border border-gray-200">
                                {formData.paymentStatus === 'pagado' ? (
                                    <div>
                                        <label className="block text-sm font-semibold text-gray-700 mb-2">Método de Pago</label>
                                        <div className="flex space-x-4">
                                            <label className="flex items-center space-x-2 cursor-pointer"><input type="radio" value="efectivo" checked={formData.paymentMethod === 'efectivo'} onChange={(e) => setFormData({...formData, paymentMethod: e.target.value})} className="w-4 h-4 text-pink-600" /><span>Efectivo</span></label>
                                            <label className="flex items-center space-x-2 cursor-pointer"><input type="radio" value="transferencia" checked={formData.paymentMethod === 'transferencia'} onChange={(e) => setFormData({...formData, paymentMethod: e.target.value})} className="w-4 h-4 text-pink-600" /><span>Transferencia</span></label>
                                        </div>
                                    </div>
                                ) : (
                                    <div>
                                        <label className="block text-sm font-semibold text-amber-800 mb-1">Teléfono para Cobranza (Obligatorio)</label>
                                        <input type="tel" placeholder="+56 9 1234 5678" value={formData.phone} onChange={(e) => setFormData({...formData, phone: e.target.value})} className="w-full p-3 border border-amber-300 rounded-xl focus:ring-2 focus:ring-amber-400 focus:border-amber-400 outline-none bg-white" required={formData.paymentStatus === 'deuda'} />
                                    </div>
                                )}
                            </div>
                        </div>
                        <button type="submit" disabled={!formData.product} className="w-full bg-green-600 text-white font-bold py-3 px-4 rounded-xl hover:bg-green-700 disabled:opacity-50 mt-4 transition-colors">Registrar Venta</button>
                    </form>
                </div>
            );
        }

        function Cobranza({ sales, showNotification, db, appDbId, setSales }) {
            const debts = sales.filter(s => s.status === 'debt');
            const [selectedDebt, setSelectedDebt] = useState(null);
            const [paymentMethod, setPaymentMethod] = useState('transferencia');

            const handleMarkAsPaid = async () => {
                if (!selectedDebt) return;
                if (db) {
                    try {
                        const debtRef = doc(db, 'artifacts', appDbId, 'public', 'data', 'sales', selectedDebt.id);
                        await updateDoc(debtRef, { status: 'paid', paymentMethod: paymentMethod, paymentDate: getTodayDate() });
                        showNotification(`Deuda de ${selectedDebt.client} marcada como pagada.`);
                        setSelectedDebt(null);
                    } catch (error) { showNotification("Error al actualizar la deuda.", "error"); }
                } else {
                    setSales(prev => prev.map(s => s.id === selectedDebt.id ? { ...s, status: 'paid', paymentMethod: paymentMethod, paymentDate: getTodayDate() } : s));
                    showNotification(`Deuda de ${selectedDebt.client} marcada como pagada (Local).`);
                    setSelectedDebt(null);
                }
            };

            return (
                <div className="max-w-3xl mx-auto space-y-6 animate-in">
                    <div className="flex items-center space-x-3 text-pink-700 border-b border-pink-200 pb-2">
                        <Wallet size={28} />
                        <h2 className="text-2xl font-bold">Gestión de Cobranzas</h2>
                    </div>
                    {debts.length === 0 ? (
                        <div className="bg-white p-8 rounded-2xl shadow-sm border border-gray-100 text-center flex flex-col items-center justify-center">
                            <div className="w-16 h-16 bg-green-100 text-green-600 rounded-full flex items-center justify-center mb-4"><CheckCircle size={32} /></div>
                            <h3 className="text-xl font-bold text-gray-800">¡Todo al día!</h3>
                            <p className="text-gray-500 mt-2">No tienes deudas pendientes por cobrar.</p>
                        </div>
                    ) : (
                        <div className="grid grid-cols-1 md:grid-cols-2 gap-4">
                            {debts.map(debt => (
                                <div key={debt.id} className="bg-white rounded-2xl shadow-sm border border-amber-200 p-5 relative overflow-hidden flex flex-col justify-between">
                                    <div className="absolute top-0 left-0 w-1 h-full bg-amber-500"></div>
                                    <div>
                                        <div className="flex justify-between items-start mb-2">
                                            <h3 className="font-bold text-gray-800 text-lg">{debt.client}</h3>
                                            <span className="font-bold text-amber-600 bg-amber-50 px-2 py-1 rounded text-sm">{formatCurrency(debt.total)}</span>
                                        </div>
                                        <p className="text-sm text-gray-600 mb-1">Producto: <b>{debt.quantity}x {debt.product}</b></p>
                                        <p className="text-xs text-gray-400 mb-4">Fecha Venta: {debt.date}</p>
                                    </div>
                                    <div className="flex space-x-2 mt-auto pt-4 border-t border-gray-100">
                                        <a href={`tel:${debt.phone}`} className="flex-1 bg-gray-100 hover:bg-gray-200 text-gray-700 font-semibold py-2 px-3 rounded-lg flex items-center justify-center space-x-2 transition-colors"><Phone size={16} /><span>Llamar</span></a>
                                        <button onClick={() => setSelectedDebt(debt)} className="flex-1 bg-green-600 hover:bg-green-700 text-white font-semibold py-2 px-3 rounded-lg flex items-center justify-center space-x-2 transition-colors"><CheckCircle size={16} /><span>Saldar</span></button>
                                    </div>
                                </div>
                            ))}
                        </div>
                    )}

                    {selectedDebt && (
                        <div className="fixed inset-0 bg-black/50 z-50 flex justify-center items-center p-4">
                            <div className="bg-white rounded-2xl p-6 w-full max-w-sm shadow-2xl animate-in">
                                <h3 className="text-xl font-bold text-gray-800 mb-4">Completar Venta</h3>
                                <p className="text-gray-600 mb-4">¿Cómo pagó <b>{selectedDebt.client}</b> los {formatCurrency(selectedDebt.total)}?</p>
                                <div className="space-y-3 mb-6">
                                    <label className="flex items-center space-x-3 p-3 border rounded-xl cursor-pointer hover:bg-gray-50"><input type="radio" value="efectivo" checked={paymentMethod === 'efectivo'} onChange={(e) => setPaymentMethod(e.target.value)} className="w-5 h-5 text-pink-600" /><span className="font-medium text-gray-700">Efectivo</span></label>
                                    <label className="flex items-center space-x-3 p-3 border rounded-xl cursor-pointer hover:bg-gray-50"><input type="radio" value="transferencia" checked={paymentMethod === 'transferencia'} onChange={(e) => setPaymentMethod(e.target.value)} className="w-5 h-5 text-pink-600" /><span className="font-medium text-gray-700">Transferencia</span></label>
                                </div>
                                <div className="flex space-x-3">
                                    <button onClick={() => setSelectedDebt(null)} className="flex-1 py-3 px-4 rounded-xl border border-gray-300 font-semibold text-gray-700 hover:bg-gray-50">Cancelar</button>
                                    <button onClick={handleMarkAsPaid} className="flex-1 py-3 px-4 rounded-xl bg-pink-600 text-white font-bold hover:bg-pink-700">Confirmar Pago</button>
                                </div>
                            </div>
                        </div>
                    )}
                </div>
            );
        }

        function Gastos({ showNotification, db, appDbId, setExpenses }) {
            const [isProcessing, setIsProcessing] = useState(false);
            const fileInputRef = useRef(null);
            const [formData, setFormData] = useState({ date: getTodayDate(), provider: '', items: '', total: '' });

            const processReceiptImage = async (file) => {
                setIsProcessing(true);
                try {
                    const reader = new FileReader();
                    reader.onloadend = async () => {
                        const base64String = reader.result.split(',')[1];
                        // ATENCIÓN: Si publicas esto por tu cuenta, necesitas colocar una API Key de Google Gemini aquí
                        // para que la lectura por inteligencia artificial funcione.
                        const apiKey = ""; 
                        
                        if(!apiKey && typeof __firebase_config === 'undefined') {
                            showNotification("La IA requiere una clave API configurada.", "error");
                            setIsProcessing(false);
                            return;
                        }

                        const promptText = `Eres un asistente contable para una pastelería. Analiza esta boleta de compra. Extrae la siguiente información y devuélvela en formato JSON estricto: "provider": Nombre del local, "items": Resumen ingredientes, "total": Valor total como número.`;
                        try {
                            const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash-preview-09-2025:generateContent?key=${apiKey}`, {
                                method: 'POST', headers: { 'Content-Type': 'application/json' },
                                body: JSON.stringify({
                                    contents: [{ role: "user", parts: [{ text: promptText }, { inlineData: { mimeType: file.type, data: base64String } }] }],
                                    generationConfig: { responseMimeType: "application/json", responseSchema: { type: "OBJECT", properties: { provider: { type: "STRING" }, items: { type: "STRING" }, total: { type: "NUMBER" } } } }
                                })
                            });
                            const result = await response.json();
                            const textResponse = result.candidates?.[0]?.content?.parts?.[0]?.text;
                            if (textResponse) {
                                const data = JSON.parse(textResponse);
                                setFormData(prev => ({ ...prev, provider: data.provider || prev.provider, items: data.items || prev.items, total: data.total ? String(data.total) : prev.total }));
                                showNotification("¡Boleta leída por IA!", "success");
                            }
                        } catch (error) { showNotification("No pudimos leer la boleta.", "error"); }
                        setIsProcessing(false);
                    };
                    reader.readAsDataURL(file);
                } catch (error) { setIsProcessing(false); }
            };

            const handleSubmit = async (e) => {
                e.preventDefault();
                if (!formData.provider || !formData.total) return showNotification("Proveedor y Total son obligatorios", "error");

                const newExpense = { date: formData.date, provider: formData.provider.trim(), items: formData.items.trim(), total: parseFloat(formData.total), timestamp: new Date().toISOString() };
                
                if (db) {
                    try {
                        await addDoc(collection(db, 'artifacts', appDbId, 'public', 'data', 'expenses'), newExpense);
                        showNotification("Gasto guardado en la nube exitosamente.");
                        setFormData({ date: getTodayDate(), provider: '', items: '', total: '' });
                    } catch (error) { showNotification("Error al registrar.", "error"); }
                } else {
                    newExpense.id = Date.now().toString();
                    setExpenses(prev => [newExpense, ...prev]);
                    showNotification("Gasto guardado localmente (Modo Demo).");
                    setFormData({ date: getTodayDate(), provider: '', items: '', total: '' });
                }
            };

            return (
                <div className="max-w-2xl mx-auto space-y-6 animate-in">
                    <div className="flex items-center space-x-3 text-pink-700 border-b border-pink-200 pb-2">
                        <Receipt size={28} />
                        <h2 className="text-2xl font-bold">Registrar Gastos</h2>
                    </div>
                    <div className="bg-blue-50 border border-blue-200 rounded-2xl p-6 text-center">
                        <h3 className="font-bold text-blue-800 mb-2">¡Asistente con Inteligencia Artificial!</h3>
                        <p className="text-sm text-blue-600 mb-4">Sube o toma una foto de tu boleta de compra. Autocompletaremos los datos por ti.</p>
                        <input type="file" accept="image/*" capture="environment" ref={fileInputRef} onChange={(e) => {if(e.target.files[0]) processReceiptImage(e.target.files[0])}} className="hidden" />
                        <button onClick={() => fileInputRef.current.click()} disabled={isProcessing} className="bg-blue-600 hover:bg-blue-700 text-white font-bold py-3 px-6 rounded-xl flex items-center justify-center space-x-2 mx-auto transition-colors disabled:opacity-50">
                            {isProcessing ? <span className="animate-pulse">Analizando imagen...</span> : <><Camera size={20} /><span>Escanear Boleta</span></>}
                        </button>
                    </div>
                    <form onSubmit={handleSubmit} className="bg-white p-6 md:p-8 rounded-2xl shadow-sm border border-gray-200 space-y-5">
                        <div><label className="block text-sm font-semibold text-gray-700 mb-1">Fecha</label><input type="date" value={formData.date} onChange={(e) => setFormData({...formData, date: e.target.value})} className="w-full p-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-pink-400 outline-none" required /></div>
                        <div><label className="block text-sm font-semibold text-gray-700 mb-1">Proveedor / Local</label><input type="text" placeholder="Ej: Supermercado Lider" value={formData.provider} onChange={(e) => setFormData({...formData, provider: e.target.value})} className="w-full p-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-pink-400 outline-none" required /></div>
                        <div><label className="block text-sm font-semibold text-gray-700 mb-1">Ítems comprados (Resumen)</label><input type="text" placeholder="Ej: Harina, Huevos, Azúcar" value={formData.items} onChange={(e) => setFormData({...formData, items: e.target.value})} className="w-full p-3 border border-gray-300 rounded-xl focus:ring-2 focus:ring-pink-400 outline-none" /></div>
                        <div><label className="block text-sm font-semibold text-gray-700 mb-1">Total Gastado ($)</label><input type="number" min="0" placeholder="Ej: 15000" value={formData.total} onChange={(e) => setFormData({...formData, total: e.target.value})} className="w-full p-3 border border-gray-300 rounded-xl font-bold text-lg text-pink-700 focus:ring-2 focus:ring-pink-400 outline-none" required /></div>
                        <button type="submit" className="w-full bg-gray-800 text-white font-bold py-3 px-4 rounded-xl hover:bg-gray-900 transition-colors">Guardar Gasto</button>
                    </form>
                </div>
            );
        }

        function NavItem({ icon, label, isActive, onClick }) {
            return <button onClick={onClick} className={`flex items-center space-x-3 w-full p-3 rounded-xl transition-all ${isActive ? 'bg-white text-pink-700 shadow-sm' : 'text-pink-100 hover:bg-pink-500'}`}>{icon}<span className="font-semibold text-left">{label}</span></button>;
        }

        function MobileTab({ icon, label, isActive, onClick }) {
            return <button onClick={onClick} className={`flex flex-col items-center justify-center p-2 w-full rounded-lg transition-colors ${isActive ? 'text-pink-600' : 'text-gray-500 hover:bg-gray-50'}`}>{icon}<span className="mt-1 font-medium">{label}</span></button>;
        }

        // Renderizar la app en la página
        const rootElement = document.getElementById('root');
        const root = createRoot(rootElement);
        root.render(<App />);
    </script>
</body>
</html>
